<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#081427;
color:white;
text-align:center;
}

.container{
max-width:1000px;
margin:auto;
padding:40px;
}

h1{
font-size:60px;

}

color:#9fb3d9;

}

.cards{
display:flex;

justify-content:center;

}

.card{
background:#101f3c;
padding:30px;
border-radius:16px;
width:260px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
transition:transform .2s;
}

.card:hover{
transform:translateY(-5px);
}

.card h2{
margin-top:0;
}

.project{
margin:8px 0;
}

a{
color:#66b3ff;
text-decoration:none;
}

a:hover{
text-decoration:underline;
}

button{
margin-top:12px;
padding:10px 18px;
border-radius:8px;
border:none;
background:#3a7bff;
color:white;
cursor:pointer;
}

button:hover{
background:#5c93ff;
}

.footer{
margin-top:80px;
color:#7f96c3;
}

</style>

</head>
